version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: auctioncore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auctioncore
      POSTGRES_PASSWORD: auctioncore
      POSTGRES_DB: auctioncore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auctioncore -d auctioncore"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: auctioncore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
